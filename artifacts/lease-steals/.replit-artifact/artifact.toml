kind = "web"
previewPath = "/"
title = "LeaseSteals"
version = "1.0.0"
id = "artifacts/lease-steals"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23668

[services.development]
run = "pnpm --filter @workspace/lease-steals run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lease-steals", "run", "build" ]
publicDir = "artifacts/lease-steals/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23668"
BASE_PATH = "/"
